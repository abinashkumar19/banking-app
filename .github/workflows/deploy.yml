name: Deploy VeeraBank

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: veerabank
  ENVIRONMENT: dev
  EKS_CLUSTER_NAME: veerabank-dev-eks
  NAMESPACE: veerabank

permissions:
  id-token: write   # not used yet (static keys below), kept for future OIDC swap
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # 1. Terraform: VPC, EKS, 20 DynamoDB tables, 21 ECR repos, SNS topic,
  #    ALB controller, IRSA roles
  # ---------------------------------------------------------------------
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      ecr_repository_urls: ${{ steps.tf_out.outputs.ecr_repository_urls }}
      backend_irsa_role_arn: ${{ steps.tf_out.outputs.backend_irsa_role_arn }}
      sns_user_registered_topic_arn: ${{ steps.tf_out.outputs.sns_user_registered_topic_arn }}
      users_db_creds_bucket: ${{ steps.tf_out.outputs.users_db_creds_bucket }}
      users_db_creds_key: ${{ steps.tf_out.outputs.users_db_creds_key }}
      transactions_history_api_url: ${{ steps.tf_out.outputs.transactions_history_api_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Ensure remote state bucket + lock table exist
        working-directory: .
        run: bash scripts/bootstrap-state.sh

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Capture outputs
        id: tf_out
        run: |
          echo "ecr_repository_urls=$(terraform output -json ecr_repository_urls | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "backend_irsa_role_arn=$(terraform output -raw backend_irsa_role_arn)" >> "$GITHUB_OUTPUT"
          echo "sns_user_registered_topic_arn=$(terraform output -raw sns_user_registered_topic_arn)" >> "$GITHUB_OUTPUT"
          echo "users_db_creds_bucket=$(terraform output -raw users_db_creds_bucket)" >> "$GITHUB_OUTPUT"
          echo "users_db_creds_key=$(terraform output -raw users_db_creds_key)" >> "$GITHUB_OUTPUT"
          echo "transactions_history_api_url=$(terraform output -raw transactions_history_api_url)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------
  # 2. Build + push all 20 microservice images + frontend, deploy to EKS,
  #    surface the single ingress URL
  # ---------------------------------------------------------------------
  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push all service images
        env:
          ECR_URLS_JSON: ${{ needs.terraform.outputs.ecr_repository_urls }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "$ECR_URLS_JSON" | jq -r 'keys[]' | while read -r svc; do
            url=$(echo "$ECR_URLS_JSON" | jq -r --arg s "$svc" '.[$s]')
            if [ "$svc" = "frontend" ]; then
              ctx="frontend"
            else
              ctx="backend"
            fi
            echo "== Building $svc from $ctx (Dockerfile: $( [ "$svc" = "frontend" ] && echo frontend/Dockerfile || echo backend/services/$svc/Dockerfile )) =="
            if [ "$svc" = "frontend" ]; then
              docker build -f frontend/Dockerfile -t "$url:$IMAGE_TAG" -t "$url:latest" frontend
            else
              docker build -f "backend/services/$svc/Dockerfile" -t "$url:$IMAGE_TAG" -t "$url:latest" backend
            fi
            docker push "$url:$IMAGE_TAG"
            docker push "$url:latest"
          done

      - name: Point kubectl at the cluster
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Render manifests
        env:
          ECR_URLS_JSON: ${{ needs.terraform.outputs.ecr_repository_urls }}
          IMAGE_TAG: ${{ github.sha }}
          ROLE_ARN: ${{ needs.terraform.outputs.backend_irsa_role_arn }}
          SNS_TOPIC_ARN: ${{ needs.terraform.outputs.sns_user_registered_topic_arn }}
          TRANSACTIONS_HISTORY_API_URL: ${{ needs.terraform.outputs.transactions_history_api_url }}
        run: |
          mkdir -p rendered

          sed "s|arn:aws:iam::<ACCOUNT_ID>:role/veerabank-dev-backend-dynamodb|$ROLE_ARN|" \
            k8s/serviceaccount.yaml > rendered/serviceaccount.yaml

          cp k8s/namespace.yaml k8s/ingress.yaml rendered/

          # 20 backend microservices
          for f in k8s/services/*-deployment.yaml; do
            svc=$(basename "$f" -deployment.yaml)
            env_name=$(echo "$svc" | tr '[:lower:]-' '[:upper:]_')
            url=$(echo "$ECR_URLS_JSON" | jq -r --arg s "$svc" '.[$s]')
            sed "s|<ECR_REPO_URL_${env_name}>:latest|$url:$IMAGE_TAG|" "$f" \
              | sed "s|<SNS_USER_REGISTERED_TOPIC_ARN>|$SNS_TOPIC_ARN|" \
              | sed "s|<TRANSACTIONS_HISTORY_API_URL>|$TRANSACTIONS_HISTORY_API_URL|" \
              > "rendered/${svc}-deployment.yaml"
          done
          cp k8s/services/*-service.yaml rendered/

          # frontend
          frontend_url=$(echo "$ECR_URLS_JSON" | jq -r '.frontend')
          sed "s|<ECR_REPO_URL_FRONTEND>:latest|$frontend_url:$IMAGE_TAG|" \
            k8s/frontend/deployment.yaml > rendered/frontend-deployment.yaml
          cp k8s/frontend/service.yaml rendered/frontend-service.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f rendered/namespace.yaml
          kubectl apply -f rendered/serviceaccount.yaml
          kubectl apply -f rendered/

      - name: Wait for rollouts
        run: |
          for f in rendered/*-deployment.yaml; do
            name=$(grep -m1 "^  name:" "$f" | awk '{print $2}')
            echo "Waiting for deployment/$name..."
            kubectl rollout status "deployment/$name" -n ${{ env.NAMESPACE }} --timeout=180s || true
          done

      - name: Wait for ALB and print the ingress URL
        run: |
          echo "Waiting for ALB hostname..."
          for i in $(seq 1 30); do
            HOST=$(kubectl get ingress veerabank-ingress -n ${{ env.NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$HOST" ]; then
              echo "http://$HOST" > ingress_url.txt
              break
            fi
            sleep 10
          done
          if [ ! -s ingress_url.txt ]; then
            echo "ALB hostname not ready yet — check 'kubectl get ingress -n ${{ env.NAMESPACE }}' manually."
            exit 0
          fi
          URL=$(cat ingress_url.txt)
          echo "### 🚀 Deployed: $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "Frontend: $URL/" >> "$GITHUB_STEP_SUMMARY"
          echo "Users API: $URL/users/register" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL"
