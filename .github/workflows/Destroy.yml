name: Destroy VeeraBank

# Manual-only - this deletes real infrastructure. You must type the
# project name to confirm, so a stray click can't nuke the account.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "veerabank" to confirm you want to destroy everything'
        required: true

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: veerabank
  ENVIRONMENT: dev
  EKS_CLUSTER_NAME: veerabank-dev-eks
  NAMESPACE: veerabank

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # 0. Guard rail - abort immediately if the confirmation phrase is wrong
  # ---------------------------------------------------------------------
  confirm:
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "veerabank" ]; then
            echo "::error::You must type 'veerabank' (lowercase, no quotes) in the confirm field to proceed."
            exit 1
          fi
          echo "Confirmed - proceeding with full teardown."

  # ---------------------------------------------------------------------
  # 1. Delete Kubernetes objects first, in particular the Ingress.
  #    The AWS Load Balancer Controller only deletes the ALB + its ENIs
  #    when the Ingress object itself is deleted. If we skip this and
  #    go straight to `terraform destroy`, the leftover ALB ENIs will
  #    make the VPC/subnet/security-group deletion hang or fail.
  # ---------------------------------------------------------------------
  cleanup-k8s:
    needs: confirm
    runs-on: ubuntu-latest
    continue-on-error: true   # cluster may already be gone/half-deleted - don't block the rest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Point kubectl at the cluster
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Delete Ingress (releases the ALB) and wait for it to disappear
        run: |
          kubectl delete ingress veerabank-ingress -n ${{ env.NAMESPACE }} --ignore-not-found=true
          echo "Waiting up to 3 minutes for the ALB to finish deprovisioning..."
          for i in $(seq 1 18); do
            if ! kubectl get ingress veerabank-ingress -n ${{ env.NAMESPACE }} >/dev/null 2>&1; then
              echo "Ingress gone."
              break
            fi
            sleep 10
          done

      - name: Delete the whole namespace (services, deployments, serviceaccount)
        run: kubectl delete namespace ${{ env.NAMESPACE }} --ignore-not-found=true --timeout=120s

      - name: Uninstall the ALB controller Helm release
        run: helm uninstall aws-load-balancer-controller -n kube-system || true

  # ---------------------------------------------------------------------
  # 2. Empty the S3 bucket (versioned - `terraform destroy` cannot remove
  #    a non-empty bucket, and a versioned bucket needs every version +
  #    delete-marker purged, not just the current objects) and force-
  #    delete every ECR repo's images so those repos can be destroyed too.
  # ---------------------------------------------------------------------
  empty-storage:
    needs: confirm
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Empty the transaction-history S3 bucket (all versions + delete markers)
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-transaction-history-${ACCOUNT_ID}"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET doesn't exist, skipping."
            exit 0
          fi

          echo "Purging all object versions from $BUCKET..."
          aws s3api list-object-versions --bucket "$BUCKET" \
            --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
            --output json > versions.json
          if [ "$(jq '.Objects | length' versions.json)" -gt 0 ]; then
            aws s3api delete-objects --bucket "$BUCKET" --delete file://versions.json
          fi

          echo "Purging all delete markers from $BUCKET..."
          aws s3api list-object-versions --bucket "$BUCKET" \
            --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' \
            --output json > markers.json
          if [ "$(jq '.Objects | length' markers.json)" -gt 0 ]; then
            aws s3api delete-objects --bucket "$BUCKET" --delete file://markers.json
          fi

          echo "Bucket emptied."

      - name: Force-delete every ECR repository (including any pushed images)
        run: |
          REPOS=$(aws ecr describe-repositories \
            --query "repositories[?starts_with(repositoryName, '${{ env.PROJECT_NAME }}-')].repositoryName" \
            --output text)
          for repo in $REPOS; do
            echo "Deleting ECR repo $repo (force, drops all images)..."
            aws ecr delete-repository --repository-name "$repo" --force || true
          done

  # ---------------------------------------------------------------------
  # 3. Terraform destroy - VPC, EKS cluster + node group, RDS/Aurora,
  #    DynamoDB tables, ECR repos (now empty), SNS topic, IAM/IRSA roles,
  #    SES identity, Lambdas.
  # ---------------------------------------------------------------------
  terraform-destroy:
    needs: [cleanup-k8s, empty-storage]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

  # ---------------------------------------------------------------------
  # 4. Optional last step - remove the remote state bucket + lock table
  #    themselves (the ones bootstrap-state.sh created). Off by default:
  #    only run this if you're fully done with the project, since wiping
  #    state makes any future `terraform apply` start from scratch.
  # ---------------------------------------------------------------------
  destroy-state-backend:
    needs: terraform-destroy
    runs-on: ubuntu-latest
    if: false   # flip to `true` (or remove this line) if you also want the tfstate bucket/lock table gone
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete tfstate bucket and lock table
        run: |
          BUCKET=$(grep -oP 'bucket\s+= "\K[^"]+' terraform/main.tf | head -1)
          TABLE=$(grep -oP 'dynamodb_table\s+= "\K[^"]+' terraform/main.tf | head -1)

          if [ -n "$BUCKET" ]; then
            echo "Emptying and deleting state bucket $BUCKET..."
            aws s3 rm "s3://$BUCKET" --recursive || true
            aws s3api list-object-versions --bucket "$BUCKET" \
              --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' --output json > v.json || true
            [ -s v.json ] && [ "$(jq '.Objects | length' v.json 2>/dev/null || echo 0)" -gt 0 ] && aws s3api delete-objects --bucket "$BUCKET" --delete file://v.json || true
            aws s3api delete-bucket --bucket "$BUCKET" || true
          fi

          if [ -n "$TABLE" ]; then
            echo "Deleting lock table $TABLE..."
            aws dynamodb delete-table --table-name "$TABLE" || true
          fi
