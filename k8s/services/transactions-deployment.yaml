apiVersion: apps/v1
kind: Deployment
metadata:
  name: transactions
  namespace: veerabank
  labels:
    app: transactions
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transactions
  template:
    metadata:
      labels:
        app: transactions
    spec:
      serviceAccountName: backend-app
      containers:
        - name: transactions
          # Replaced at deploy time with the real ECR image + tag (see deploy.yml)
          image: "<ECR_REPO_URL_TRANSACTIONS>:latest"
          ports:
            - containerPort: 8000
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: TABLE_PREFIX
              value: "veerabank-dev"
            - name: TRANSACTIONS_HISTORY_API_URL
              value: "<TRANSACTIONS_HISTORY_API_URL>"
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "250m"
              memory: "192Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
