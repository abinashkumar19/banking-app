apiVersion: apps/v1
kind: Deployment
metadata:
  name: cheques
  namespace: veerabank
  labels:
    app: cheques
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cheques
  template:
    metadata:
      labels:
        app: cheques
    spec:
      serviceAccountName: backend-app
      containers:
        - name: cheques
          # Replaced at deploy time with the real ECR image + tag (see deploy.yml)
          image: "<ECR_REPO_URL_CHEQUES>:latest"
          ports:
            - containerPort: 8000
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: TABLE_PREFIX
              value: "veerabank-dev"
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "250m"
              memory: "192Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
