apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: veerabank
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-app
      containers:
        - name: backend
          # Replace <ECR_REPO_URL> with the ecr_repository_url terraform output,
          # e.g. 123456789012.dkr.ecr.ap-south-1.amazonaws.com/veerabank-backend:latest
          image: "<ECR_REPO_URL>:latest"
          ports:
            - containerPort: 8000
          env:
            - name: AWS_REGION
              value: "ap-south-1"
            - name: ACCOUNTS_TABLE
              value: "veerabank-dev-accounts"
            - name: TRANSACTIONS_TABLE
              value: "veerabank-dev-transactions"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
