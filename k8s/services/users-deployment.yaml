apiVersion: apps/v1
kind: Deployment
metadata:
  name: users
  namespace: veerabank
  labels:
    app: users
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
    spec:
      serviceAccountName: backend-app
      containers:
        - name: users
          # Replaced at deploy time with the real ECR image + tag (see deploy.yml)
          image: "<ECR_REPO_URL_USERS>:latest"
          ports:
            - containerPort: 8000
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: TABLE_PREFIX
              value: "veerabank-dev"
            - name: USER_REGISTERED_TOPIC_ARN
              value: "<SNS_USER_REGISTERED_TOPIC_ARN>"
            - name: DB_SECRET_ARN
              value: "<USERS_DB_SECRET_ARN>"
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "250m"
              memory: "192Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
